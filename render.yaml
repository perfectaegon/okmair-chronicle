services:
  - type: web
    name: perfectumair-chronicle
    runtime: ruby
    plan: free
    buildCommand: echo "No build step"
    startCommand: ruby server.rb
    healthCheckPath: /
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FORCE_SSL
        value: "1"
      - key: SESSION_HOURS
        value: "168"